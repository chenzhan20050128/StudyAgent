<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>StudyAgent 学习助手</title>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/dompurify/dist/purify.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            color-scheme: light dark;
            font-family: "Segoe UI", -apple-system, sans-serif;
        }

        body {
            background: #0a0e27;
            color: #e6e8f2;
            min-height: 100vh;
            overflow: hidden;
        }

        .layout {
            display: grid;
            grid-template-columns: 320px 1fr;
            height: 100vh;
        }

        /* 侧边栏设计 */
        .sidebar {
            background: #0f1426;
            border-right: 1px solid #1f2a44;
            display: flex;
            flex-direction: column;
            overflow-y: auto;
        }

        .sidebar-header {
            padding: 12px 10px;
            border-bottom: 1px solid #1f2a44;
            font-size: 16px;
            font-weight: 900;
            background: linear-gradient(135deg, #5c7cff, #7ee0ff);
            background-clip: text;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: 1px;
        }

        .sidebar-section {
            padding: 10px;
            border-bottom: 1px solid #1f2a44;
        }

        .section-title {
            font-size: 6px;
            font-weight: 700;
            color: #8d97bd;
            text-transform: uppercase;
            margin-bottom: 8px;
            letter-spacing: 1px;
            display: flex;
            align-items: center;
            gap: 4px;
        }

        /* 上传区域精简 */
        #upload-form {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        input[type="text"],
        textarea {
            width: 100%;
            padding: 10px 12px;
            border: 1px solid #27334d;
            border-radius: 6px;
            background: #0a0e27;
            color: #e6e8f2;
            font-size: 14px;
        }

        input[type="file"] {
            font-size: 14px;
            color: #8d97bd;
            cursor: pointer;
        }

        #upload-btn {
            margin-top: 8px;
            padding: 12px;
            border: none;
            border-radius: 8px;
            background: linear-gradient(135deg, #5c7cff, #7ee0ff);
            color: #0a0e27;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s;
            font-size: 14px;
        }

        #upload-btn:hover {
            transform: translateY(-1px);
            opacity: 0.9;
        }

        #upload-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        #upload-status {
            font-size: 13px;
            margin-top: 8px;
            color: #7ee0ff;
            display: none;
        }

        #upload-trigger-btn:hover {
            transform: translateY(-1px);
            opacity: 0.9;
        }

        /* 复习任务列表 */
        .review-container {
            flex: 1;
            overflow-y: auto;
            padding: 10px;
        }

        .review-item {
            background: #11172b;
            border: 1px solid #1f2a44;
            border-radius: 5px;
            padding: 6px;
            margin-bottom: 6px;
            transition: all 0.2s;
        }

        .review-item:hover {
            border-color: #5c7cff;
            background: #151c36;
        }

        .review-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 2px;
        }

        .review-tag {
            font-size: 2px;
            padding: 1px 2px;
            border-radius: 1px;
            background: #1f2a44;
            color: #7ee0ff;
            font-weight: 700;
        }

        .review-meta {
            font-size: 2px;
            color: #565f89;
            text-align: right;
        }

        .review-text {
            font-size: 3px;
            color: #c0c8e5;
            line-height: 1.0;
            font-weight: 500;
            margin-top: 2px;
        }

        .review-detail {
            font-size: 2px;
            color: #8d97bd;
            margin-top: 1px;
            padding-top: 1px;
            border-top: 1px dashed #1f2a44;
            line-height: 1.0;
        }

        .review-empty {
            text-align: center;
            color: #565f89;
            padding: 20px 0;
            font-size: 6px;
        }

        /* 主对话区域 - 占据 80% 视野感 */
        .main {
            display: flex;
            flex-direction: column;
            background: #0a0e27;
            position: relative;
            height: 100vh;
            overflow: hidden;
        }

        .chat-header {
            padding: 16px 40px;
            border-bottom: 1px solid #1f2a44;
            background: rgba(15, 20, 38, 0.8);
            backdrop-filter: blur(12px);
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-shrink: 0;
        }

        .chat-header h2 {
            font-size: 18px;
            color: #e6e8f2;
        }

        #chat-box {
            flex: 1;
            overflow-y: auto;
            padding: 30px 40px;
            display: flex;
            flex-direction: column;
            gap: 24px;
            scroll-behavior: smooth;
        }

        /* 消息样式美化 */
        .msg {
            display: flex;
            max-width: 85%;
        }

        .msg.user {
            align-self: flex-end;
            flex-direction: row-reverse;
        }

        .msg.ai {
            align-self: flex-start;
        }

        .msg-content {
            padding: 14px 18px;
            border-radius: 16px;
            font-size: 15px;
            line-height: 1.6;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
        }

        .msg.user .msg-content {
            background: linear-gradient(135deg, #5c7cff, #7ee0ff);
            color: #0a0e27;
            border-bottom-right-radius: 2px;
            font-weight: 500;
        }

        .msg.ai .msg-content {
            background: #11172b;
            color: #e6e8f2;
            border: 1px solid #1f2a44;
            border-bottom-left-radius: 2px;
        }

        /* Markdown 内部样式 */
        .msg-content h1,
        .msg-content h2 {
            font-size: 1.1em;
            margin: 12px 0 6px;
            color: #7ee0ff;
        }

        .msg-content p {
            margin-bottom: 8px;
        }

        .msg-content code {
            background: #1a223e;
            padding: 2px 4px;
            border-radius: 4px;
            font-family: monospace;
        }

        .msg-content pre {
            background: #0a0e27;
            padding: 12px;
            border-radius: 8px;
            overflow-x: auto;
            margin: 10px 0;
            border: 1px solid #1f2a44;
        }

        .msg-content ul,
        .msg-content ol {
            margin-left: 20px;
            margin-bottom: 8px;
        }

        /* 输入区域悬浮感 */
        .input-container {
            padding: 20px 40px 30px;
            background: linear-gradient(to top, #0a0e27, transparent);
            flex-shrink: 0;
        }

        .input-wrapper {
            background: #11172b;
            border: 1px solid #1f2a44;
            border-radius: 16px;
            padding: 8px 16px;
            display: flex;
            align-items: center;
            gap: 12px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
        }

        #chat-input {
            flex: 1;
            background: transparent;
            border: none;
            color: #e6e8f2;
            padding: 12px 0;
            font-size: 15px;
            outline: none;
            resize: none;
            max-height: 150px;
        }

        #chat-btn {
            background: #5c7cff;
            color: white;
            border: none;
            width: 40px;
            height: 40px;
            border-radius: 12px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: background 0.2s;
        }

        #chat-btn:hover {
            background: #7ee0ff;
        }

        ::-webkit-scrollbar {
            width: 4px;
        }

        ::-webkit-scrollbar-thumb {
            background: #1f2a44;
            border-radius: 10px;
        }

        /* 模态对话框样式 */
        .modal {
            display: none;
            position: fixed;
            z-index: 1000;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.5);
        }

        .modal-content {
            background-color: #0f1426;
            margin: 10% auto;
            padding: 0;
            border: 1px solid #1f2a44;
            border-radius: 10px;
            width: 90%;
            max-width: 500px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
        }

        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px;
            border-bottom: 1px solid #1f2a44;
        }

        .modal-header h3 {
            margin: 0;
            color: #e6e8f2;
            font-size: 18px;
        }

        .modal-header button {
            background: none;
            border: none;
            color: #8d97bd;
            font-size: 24px;
            cursor: pointer;
            padding: 0;
            width: 30px;
            height: 30px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .modal-body {
            padding: 20px;
        }
    </style>
</head>

<body>
    <div class="layout">
        <!-- 侧边栏 -->
        <div class="sidebar">
            <div class="sidebar-header">StudyAgent</div>

            <!-- 上传区 -->
            <div class="sidebar-section">
                <div class="section-title"><span>📁</span> 上传资料</div>
                <button id="upload-trigger-btn">上传资料</button>
            </div>

            <!-- 今日学习任务（日常任务） -->
            <div class="review-container">
                <div class="section-title"><span>📅</span> 今日学习任务</div>
                <div id="daily-task-list">
                    <div class="review-empty">正在拉取今日学习任务...</div>
                </div>
            </div>

            <!-- 复习推送区 -->
            <div class="review-container">
                <div class="section-title"><span>🔔</span> 每日复习提醒</div>
                <div id="review-list">
                    <!-- 动态加载 -->
                    <div class="review-empty">正在拉取今日复习任务...</div>
                </div>
            </div>

            <!-- 薄弱点清单 -->
            <div class="review-container">
                <div class="section-title"><span>📉</span> 知识薄弱点</div>
                <div id="weak-point-list">
                    <div class="review-empty">正在拉取薄弱点...</div>
                </div>
            </div>
        </div>

        <!-- 主对话区 -->
        <div class="main">
            <div class="chat-header">
                <h2>智能对话</h2>
                <div style="display: flex; align-items: center; gap: 16px;">
                    <button id="new-chat-btn" title="开启新对话"
                        style="background: linear-gradient(135deg, #5c7cff, #7ee0ff); border:none; color:#0a0e27; padding:8px 16px; border-radius:8px; cursor:pointer; font-weight:600; font-size:13px; transition:opacity 0.2s;">
                        ✨ 新对话
                    </button>
                    <button id="copy-btn" title="复制对话记录"
                        style="background:transparent; border:none; color:#1f2a44; cursor:pointer; padding:4px; display:flex; align-items:center; transition:color 0.2s;">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                            stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <rect x="9" y="9" width="13" height="13" rx="2" ry="2"></rect>
                            <path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path>
                        </svg>
                    </button>
                    <div style="font-size: 12px; color: #565f89;">基于知识库 RAG</div>
                </div>
            </div>
            <div id="chat-box">
                <div class="msg ai">
                    <div class="msg-content">你好！我是你的 StudyAgent。你可以上传资料建立知识库，我会为你规划学习、生成测验并提醒复习。今天想学点什么？</div>
                </div>
            </div>

            <div class="input-container">
                <div class="input-wrapper">
                    <textarea id="chat-input" placeholder="输入问题..." rows="1"></textarea>
                    <button id="chat-btn">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                            stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                            <line x1="22" y1="2" x2="11" y2="13"></line>
                            <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
                        </svg>
                    </button>
                </div>
            </div>
        </div>

        <!-- 上传对话框 -->
        <div id="upload-modal" class="modal">
            <div class="modal-content">
                <div class="modal-header">
                    <h3>上传资料</h3>
                    <button id="modal-close">&times;</button>
                </div>
                <div class="modal-body">
                    <div id="upload-form">
                        <input id="file" type="file" />
                        <textarea id="url" placeholder="粘贴 URL 或 文本..." rows="2"></textarea>
                        <input id="title" type="text" placeholder="标题 (可选)" />
                        <button id="upload-btn">开始解析</button>
                        <div id="upload-status" class="result"></div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const qs = (id) => document.getElementById(id);
        const chatBox = qs('chat-box');
        const chatInput = qs('chat-input');
        const chatBtn = qs('chat-btn');
        const uploadBtn = qs('upload-btn');
        const reviewList = qs('review-list');

        // 模态对话框相关
        const uploadTriggerBtn = qs('upload-trigger-btn');
        const uploadModal = qs('upload-modal');
        const modalClose = qs('modal-close');

        // 显示模态对话框
        uploadTriggerBtn.addEventListener('click', () => {
            uploadModal.style.display = 'block';
        });

        // 关闭模态对话框
        modalClose.addEventListener('click', () => {
            uploadModal.style.display = 'none';
        });

        // 点击模态背景关闭
        uploadModal.addEventListener('click', (e) => {
            if (e.target === uploadModal) {
                uploadModal.style.display = 'none';
            }
        });

        // 自动高度文本域
        chatInput.addEventListener('input', function () {
            this.style.height = 'auto';
            this.style.height = (this.scrollHeight) + 'px';
        });

        // 1. 自动拉取复习任务
        async function loadTodayReviews() {
            try {
                const res = await fetch('/api/reviews/today');
                const data = await res.json();
                if (!data.items || data.items.length === 0) {
                    reviewList.innerHTML = '<div class="review-empty">☕ 今日无待复习内容，去学点新的吧！</div>';
                    return;
                }
                reviewList.innerHTML = data.items.map(item => {
                    const typeLabel = item.target_type === 'daily_task' ? '任务复习' : '错题巩固';
                    const stageLabel = item.stage ? `复习阶段 ${item.stage}` : '';

                    let title = '复习任务';
                    let detailHtml = '';

                    if (item.target_type === 'daily_task' && item.target) {
                        title = item.target.title || '今日学习计划';
                        if (item.target.outline) {
                            const outline = Array.isArray(item.target.outline) ? item.target.outline : [];
                            detailHtml = outline.map(p => `<div style="margin-top:2px;">• ${p}</div>`).join('');
                        }
                    } else if (item.target_type === 'weak_point' && item.target) {
                        title = '薄弱点加固';
                        detailHtml = `<div style="color:#ff9e64;">${item.target.description || '知识点遗漏'}</div>`;
                        if (item.target.level) {
                            detailHtml += `<div style="font-size:10px; opacity:0.7;">掌握程度: ${item.target.level}</div>`;
                        }
                    }

                    return `
            <div class="review-item">
              <div class="review-header">
                <span class="review-tag">${typeLabel}</span>
                <span class="review-meta">${stageLabel}</span>
              </div>
              <div class="review-text">${title}</div>
              <div class="review-detail">${detailHtml || '基于遗忘曲线的例行复习'}</div>
            </div>
          `;
                }).join('');
            } catch (e) {
                reviewList.innerHTML = '<div class="review-empty">加载失败，请检查网络</div>';
            }
        }

        // 2. 上传逻辑
        async function uploadDocument() {
            const file = qs('file').files[0];
            const url = qs('url').value;
            const title = qs('title').value;

            if (!file && !url) return alert('请提供文件或文本/URL');

            uploadBtn.disabled = true;
            uploadBtn.textContent = '解析中...';
            const status = qs('upload-status');
            status.style.display = 'block';
            status.textContent = '⏱ 正在处理文档分块并建立索引...';

            const formData = new FormData();
            if (file) formData.append('file', file);
            if (url) formData.append('url', url);
            if (title) formData.append('title', title);

            try {
                const res = await fetch('/api/documents/upload', { method: 'POST', body: formData });
                const data = await res.json();
                if (res.ok) {
                    status.textContent = '✅ 解析完成，知识库已更新';
                    qs('file').value = '';
                    qs('url').value = '';
                    setTimeout(() => { status.style.display = 'none'; }, 3000);
                } else {
                    throw new Error(data.error);
                }
            } catch (e) {
                status.textContent = '❌ 错误: ' + e.message;
            } finally {
                uploadBtn.disabled = false;
                uploadBtn.textContent = '开始解析';
            }
        }

        // 3. 对话渲染
        function appendMsg(role, text) {
            const div = document.createElement('div');
            div.className = `msg ${role === 'user' ? 'user' : 'ai'}`;
            const content = document.createElement('div');
            content.className = 'msg-content';

            if (role === 'ai') {
                const html = marked.parse(text);
                content.innerHTML = DOMPurify.sanitize(html);
            } else {
                content.textContent = text;
            }

            div.appendChild(content);
            chatBox.appendChild(div);
            chatBox.scrollTop = chatBox.scrollHeight;
        }

        async function handleSend() {
            const text = chatInput.value.trim();
            if (!text) return;

            appendMsg('user', text);
            chatInput.value = '';
            chatInput.style.height = 'auto';

            try {
                const res = await fetch('/api/chat', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ query: text })
                });
                const data = await res.json();
                appendMsg('ai', data.reply || '抱歉，我没有理解你的意思。');
            } catch (e) {
                appendMsg('ai', '❌ 服务器连接失败: ' + e.message);
            }
        }

        uploadBtn.addEventListener('click', uploadDocument);
        chatBtn.addEventListener('click', handleSend);

        // 4. 复制功能
        qs('copy-btn').addEventListener('click', async () => {
            const messages = Array.from(chatBox.querySelectorAll('.msg')).map(msg => {
                const isUser = msg.classList.contains('user');
                const role = isUser ? '[user]' : '[assistant]';
                let content = msg.querySelector('.msg-content').innerText.replace(/\n/g, ' ').trim();
                return `${role}: ${content}`;
            }).join('\n');

            try {
                await navigator.clipboard.writeText(messages);
                const btn = qs('copy-btn');
                const originalColor = btn.style.color;
                btn.style.color = '#7ee0ff'; // 亮色提示成功
                setTimeout(() => btn.style.color = originalColor, 1000);
            } catch (err) {
                alert('复制失败: ' + err);
            }
        });

        chatInput.addEventListener('keydown', (e) => {
            if (e.key === 'Enter' && e.ctrlKey) {
                e.preventDefault();
                handleSend();
            }
        });

        // 5. 新对话按钮
        qs('new-chat-btn').addEventListener('click', () => {
            chatBox.innerHTML = '';
            chatInput.value = '';
            chatInput.style.height = 'auto';
            appendMsg('ai', '你好！我是你的 StudyAgent。你可以上传资料建立知识库，我会为你规划学习、生成测验并提醒复习。今天想学点什么？');
        });

        // 页面启动拉取
        window.addEventListener('load', loadTodayReviews);
    </script>
</body>

</html>

<script>
    // === 工具函数 ===
    function formatDate(dateStr) {
        if (!dateStr) return "";
        try {
            const d = new Date(dateStr);
            return d.toISOString().slice(0, 10);
        } catch {
            return dateStr;
        }
    }

    async function apiGet(url) {
        const resp = await fetch(url);
        if (!resp.ok) {
            throw new Error(`GET ${url} failed: ${resp.status}`);
        }
        return resp.json();
    }

    async function apiPost(url, body) {
        const resp = await fetch(url, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: body ? JSON.stringify(body) : null,
        });
        if (!resp.ok) {
            const msg = await resp.text();
            throw new Error(`POST ${url} failed: ${resp.status} ${msg}`);
        }
        return resp.json().catch(() => ({}));
    }

    // === 日常任务相关 ===
    async function loadTodayDailyTasks() {
        const container = document.getElementById("daily-task-list");
        container.innerHTML = '<div class="review-empty">正在拉取今日学习任务...</div>';
        try {
            const data = await apiGet("/api/daily-tasks/today");
            const tasks = data.tasks || [];
            if (!tasks.length) {
                container.innerHTML = '<div class="review-empty">今日暂无学习任务</div>';
                return;
            }
            container.innerHTML = "";
            for (const t of tasks) {
                const div = document.createElement("div");
                div.className = "review-item";
                const statusLabel = t.status || "pending";
                div.innerHTML = `
                    <div class="review-header">
                        <div>
                            <div class="review-tag">日常任务</div>
                            <div class="review-text" style="margin-top:2px;">${t.title}</div>
                        </div>
                        <div class="review-meta">
                            <div>日期：${formatDate(t.date)}</div>
                            <div>状态：${statusLabel}</div>
                        </div>
                    </div>
                    <div class="review-detail">
                        ${t.outline && t.outline.length ? t.outline.map(p => `• ${p}`).join('<br/>') : "基于学习计划生成的日常任务"}
                    </div>
                    <div style="margin-top:4px; display:flex; gap:4px; justify-content:flex-end;">
                        <button class="mini-btn" data-action="complete">完成任务</button>
                        <button class="mini-btn" data-action="skip">跳过任务</button>
                    </div>
                `;

                const completeBtn = div.querySelector('button[data-action="complete"]');
                const skipBtn = div.querySelector('button[data-action="skip"]');
                completeBtn.onclick = () => completeDailyTask(t.id, "completed");
                skipBtn.onclick = () => completeDailyTask(t.id, "skipped");

                container.appendChild(div);
            }
        } catch (e) {
            console.error(e);
            container.innerHTML = '<div class="review-empty">获取今日学习任务失败</div>';
        }
    }

    async function completeDailyTask(taskId, status) {
        try {
            await apiPost(`/api/daily-tasks/${taskId}/status`, { status });
            await loadTodayDailyTasks();
            await loadTodayReviews();
        } catch (e) {
            console.error(e);
            alert("更新日常任务状态失败: " + e.message);
        }
    }

    // === 复习任务相关 ===
    async function loadTodayReviews() {
        const container = document.getElementById("review-list");
        container.innerHTML = '<div class="review-empty">正在拉取今日复习任务...</div>';
        try {
            const data = await apiGet("/api/reviews/today");
            const items = data.items || [];
            if (!items.length) {
                container.innerHTML = '<div class="review-empty">今日暂无需要复习的任务</div>';
                return;
            }
            container.innerHTML = "";
            for (const item of items) {
                const div = document.createElement("div");
                div.className = "review-item";

                const target = item.target || {};
                const isDaily = item.target_type === "daily_task";
                const isWeak = item.target_type === "weak_point";

                const title = isDaily
                    ? (target.title || "日常任务")
                    : (target.description || "薄弱点复习");

                div.innerHTML = `
                    <div class="review-header">
                        <div>
                            <div class="review-tag">${isDaily ? "日常任务复习" : "薄弱点复习"} · 第${item.stage}轮</div>
                            <div class="review-text" style="margin-top:4px;">${title}</div>
                        </div>
                        <div class="review-meta">
                            <div>计划日期：${formatDate(item.scheduled_date)}</div>
                            <div>状态：${item.status}</div>
                        </div>
                    </div>
                    <div class="review-detail">
                        ${isDaily ? `学习日期：${formatDate(target.date)}` : ""}
                    </div>
                    <div style="margin-top:4px; display:flex; gap:4px; justify-content:flex-end;">
                        <button class="mini-btn" data-action="complete">完成复习</button>
                        <button class="mini-btn" data-action="skip">跳过本次</button>
                    </div>
                `;

                const completeBtn = div.querySelector('button[data-action="complete"]');
                const skipBtn = div.querySelector('button[data-action="skip"]');
                completeBtn.onclick = () => completeReview(item.review_id, "completed");
                skipBtn.onclick = () => completeReview(item.review_id, "skipped");

                container.appendChild(div);
            }
        } catch (e) {
            console.error(e);
            container.innerHTML = '<div class="review-empty">获取复习任务失败</div>';
        }
    }

    async function completeReview(reviewId, status) {
        try {
            await apiPost(`/api/reviews/${reviewId}/complete`, { status });
            await loadTodayReviews();
        } catch (e) {
            console.error(e);
            alert("更新复习任务状态失败: " + e.message);
        }
    }

    // === 薄弱点相关 ===
    async function loadWeakPoints() {
        const container = document.getElementById("weak-point-list");
        container.innerHTML = '<div class="review-empty">正在拉取薄弱点...</div>';
        try {
            const data = await apiGet("/api/weak-points?status=pending");
            const items = data.items || [];
            if (!items.length) {
                container.innerHTML = '<div class="review-empty">暂无待解决的薄弱点</div>';
                return;
            }
            container.innerHTML = "";
            for (const wp of items) {
                const div = document.createElement("div");
                div.className = "review-item";
                div.innerHTML = `
                    <div class="review-header">
                        <div>
                            <div class="review-tag">薄弱点 · ${wp.level || "medium"}</div>
                            <div class="review-text" style="margin-top:4px;">${wp.description}</div>
                        </div>
                        <div class="review-meta">
                            <div>状态：${wp.status}</div>
                            <div>创建：${formatDate(wp.created_at)}</div>
                        </div>
                    </div>
                    <div class="review-detail">
                        状态：${wp.status} · 创建：${formatDate(wp.created_at)}
                    </div>
                    <div style="margin-top:4px; display:flex; gap:4px; justify-content:flex-end;">
                        <button class="mini-btn" data-action="resolved">标记已解决</button>
                        <button class="mini-btn" data-action="ignored">忽略</button>
                    </div>
                `;

                const resolvedBtn = div.querySelector('button[data-action="resolved"]');
                const ignoredBtn = div.querySelector('button[data-action="ignored"]');
                resolvedBtn.onclick = () => updateWeakPointStatus(wp.id, "resolved");
                ignoredBtn.onclick = () => updateWeakPointStatus(wp.id, "ignored");

                container.appendChild(div);
            }
        } catch (e) {
            console.error(e);
            container.innerHTML = '<div class="review-empty">获取薄弱点失败</div>';
        }
    }

    async function updateWeakPointStatus(id, status) {
        try {
            await apiPost(`/api/weak-points/${id}/status`, { status });
            await loadWeakPoints();
        } catch (e) {
            console.error(e);
            alert("更新薄弱点状态失败: " + e.message);
        }
    }

    // 简单按钮样式，复用现有色系
    const style = document.createElement("style");
    style.textContent = `
        .mini-btn {
            padding: 1px 3px;
            border-radius: 2px;
            border: none;
            font-size: 4px;
            cursor: pointer;
            background: #1f2a44;
            color: #e6e8f2;
            transition: background 0.2s, transform 0.1s;
        }
        .mini-btn:hover {
            background: #5c7cff;
            transform: translateY(-1px);
        }
    `;
    document.head.appendChild(style);

    // 初始化加载
    window.addEventListener("load", () => {
        loadTodayDailyTasks();
        loadTodayReviews();
        loadWeakPoints();
    });
</script>
