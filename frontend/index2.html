<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>StudyAgent 学习助手</title>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/dompurify/dist/purify.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/echarts@5.5.0/dist/echarts.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            color-scheme: light dark;
            font-family: "Segoe UI", -apple-system, sans-serif;
        }

        body {
            background: #0a0e27;
            color: #e6e8f2;
            min-height: 100vh;
            overflow: hidden;
        }

        .layout {
            display: grid;
            grid-template-columns: 320px 1fr 320px;
            height: 100vh;
        }

        /* 侧边栏设计 */
        .sidebar {
            background: #0f1426;
            border-right: 1px solid #1f2a44;
            display: flex;
            flex-direction: column;
            overflow-y: auto;
        }

        .right-sidebar {
            background: #0f1426;
            border-left: 1px solid #1f2a44;
            display: flex;
            flex-direction: column;
            overflow-y: auto;
        }

        .sidebar-header {
            padding: 12px 10px;
            border-bottom: 1px solid #1f2a44;
            font-size: 32px;
            font-weight: 900;
            background: linear-gradient(135deg, #5c7cff, #7ee0ff);
            background-clip: text;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: 1px;
        }

        .sidebar-section {
            padding: 10px;
            border-bottom: 1px solid #1f2a44;
        }

        .section-title {
            font-size: 14px;
            font-weight: 700;
            color: #8d97bd;
            text-transform: uppercase;
            margin-bottom: 8px;
            letter-spacing: 1px;
            display: flex;
            align-items: center;
            gap: 4px;
        }

        /* 上传区域精简 */
        #upload-form {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        input[type="text"],
        textarea {
            width: 100%;
            padding: 10px 12px;
            border: 1px solid #27334d;
            border-radius: 6px;
            background: #0a0e27;
            color: #e6e8f2;
            font-size: 14px;
        }

        input[type="file"] {
            font-size: 14px;
            color: #8d97bd;
            cursor: pointer;
        }

        #upload-btn {
            margin-top: 8px;
            padding: 12px;
            border: none;
            border-radius: 8px;
            background: linear-gradient(135deg, #5c7cff, #7ee0ff);
            color: #0a0e27;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s;
            font-size: 14px;
        }

        #upload-btn:hover {
            transform: translateY(-1px);
            opacity: 0.9;
        }

        #upload-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        #upload-status {
            font-size: 13px;
            margin-top: 8px;
            color: #7ee0ff;
            display: none;
        }

        #upload-trigger-btn {
            width: 100%;
            padding: 12px;
            border: none;
            border-radius: 8px;
            background: linear-gradient(135deg, #5c7cff, #7ee0ff);
            color: #0a0e27;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s;
            font-size: 16px;
        }

        #upload-trigger-btn:hover {
            transform: translateY(-1px);
            opacity: 0.9;
        }

        #share-trigger-btn {
            width: 100%;
            padding: 12px;
            border: none;
            border-radius: 8px;
            background: linear-gradient(135deg, #5c7cff, #7ee0ff);
            color: #0a0e27;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s;
            font-size: 16px;
        }

        #share-trigger-btn:hover {
            transform: translateY(-1px);
            opacity: 0.9;
        }

        /* 复习任务列表 */
        .review-container {
            flex: 1;
            overflow-y: auto;
            padding: 10px;
        }

        .review-item {
            background: #11172b;
            border: 1px solid #1f2a44;
            border-radius: 5px;
            padding: 6px;
            margin-bottom: 6px;
            transition: all 0.2s;
        }

        .review-item:hover {
            border-color: #5c7cff;
            background: #151c36;
        }

        .review-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 2px;
        }

        .review-tag {
            font-size: 13px;
            padding: 1px 4px;
            border-radius: 4px;
            background: #1f2a44;
            color: #7ee0ff;
            font-weight: 700;
        }

        .review-meta {
            font-size: 13px;
            color: #565f89;
            text-align: right;
        }

        .review-text {
            font-size: 16px;
            color: #c0c8e5;
            line-height: 1.4;
            font-weight: 500;
            margin-top: 4px;
        }

        .review-detail {
            font-size: 14px;
            color: #8d97bd;
            margin-top: 4px;
            padding-top: 4px;
            border-top: 1px dashed #1f2a44;
            line-height: 1.4;
        }

        .review-empty {
            text-align: center;
            color: #565f89;
            padding: 20px 0;
            font-size: 15px;
        }

        /* 主对话区域 - 占据 80% 视野感 */
        .main {
            display: flex;
            flex-direction: column;
            background: #0a0e27;
            position: relative;
            height: 100vh;
            overflow: hidden;
        }

        .chat-header {
            padding: 16px 40px;
            border-bottom: 1px solid #1f2a44;
            background: rgba(15, 20, 38, 0.8);
            backdrop-filter: blur(12px);
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-shrink: 0;
        }

        .chat-header h2 {
            font-size: 18px;
            color: #e6e8f2;
        }

        #chat-box {
            flex: 1;
            overflow-y: auto;
            padding: 30px 40px;
            display: flex;
            flex-direction: column;
            gap: 24px;
            scroll-behavior: smooth;
        }

        /* 消息样式美化 */
        .msg {
            display: flex;
            max-width: 85%;
        }

        .msg.user {
            align-self: flex-end;
            flex-direction: row-reverse;
        }

        .msg.ai {
            align-self: flex-start;
        }

        .msg-content {
            padding: 14px 18px;
            border-radius: 16px;
            font-size: 15px;
            line-height: 1.6;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
        }

        .msg.user .msg-content {
            background: linear-gradient(135deg, #5c7cff, #7ee0ff);
            color: #0a0e27;
            border-bottom-right-radius: 2px;
            font-weight: 500;
        }

        .msg.ai .msg-content {
            background: #11172b;
            color: #e6e8f2;
            border: 1px solid #1f2a44;
            border-bottom-left-radius: 2px;
        }

        /* Markdown 内部样式 */
        .msg-content h1,
        .msg-content h2 {
            font-size: 1.1em;
            margin: 12px 0 6px;
            color: #7ee0ff;
        }

        .msg-content p {
            margin-bottom: 8px;
        }

        .msg-content code {
            background: #1a223e;
            padding: 2px 4px;
            border-radius: 4px;
            font-family: monospace;
        }

        .msg-content pre {
            background: #0a0e27;
            padding: 12px;
            border-radius: 8px;
            overflow-x: auto;
            margin: 10px 0;
            border: 1px solid #1f2a44;
        }

        .msg-content ul,
        .msg-content ol {
            margin-left: 20px;
            margin-bottom: 8px;
        }

        /* 输入区域悬浮感 */
        .input-container {
            padding: 20px 40px 30px;
            background: linear-gradient(to top, #0a0e27, transparent);
            flex-shrink: 0;
        }

        .input-wrapper {
            background: #11172b;
            border: 1px solid #1f2a44;
            border-radius: 16px;
            padding: 8px 16px;
            display: flex;
            align-items: center;
            gap: 12px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
        }

        #chat-input {
            flex: 1;
            background: transparent;
            border: none;
            color: #e6e8f2;
            padding: 12px 0;
            font-size: 15px;
            outline: none;
            resize: none;
            max-height: 150px;
        }

        #chat-btn {
            background: #5c7cff;
            color: white;
            border: none;
            width: 40px;
            height: 40px;
            border-radius: 12px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: background 0.2s;
        }

        #chat-btn:hover {
            background: #7ee0ff;
        }

        ::-webkit-scrollbar {
            width: 4px;
        }

        ::-webkit-scrollbar-thumb {
            background: #1f2a44;
            border-radius: 10px;
        }

        /* 模态对话框样式 */
        .modal {
            display: none;
            position: fixed;
            z-index: 1000;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.5);
        }

        .modal-content {
            background-color: #0f1426;
            margin: 10% auto;
            padding: 0;
            border: 1px solid #1f2a44;
            border-radius: 10px;
            width: 90%;
            max-width: 500px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
        }

        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px;
            border-bottom: 1px solid #1f2a44;
        }

        .modal-header h3 {
            margin: 0;
            color: #e6e8f2;
            font-size: 18px;
        }

        .modal-header button {
            background: none;
            border: none;
            color: #8d97bd;
            font-size: 24px;
            cursor: pointer;
            padding: 0;
            width: 30px;
            height: 30px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .modal-body {
            padding: 20px;
            max-height: 400px;
            overflow-y: auto;
        }

        /* 共享资料样式 */
        .share-doc-list {
            background: #0a0e27;
            border: 1px solid #27334d;
            border-radius: 10px;
            padding: 10px;
            max-height: 260px;
            overflow-y: auto;
        }

        .share-doc-item {
            display: flex;
            gap: 10px;
            align-items: flex-start;
            padding: 10px 12px;
            border-radius: 8px;
            background: #11172b;
            border: 1px solid transparent;
            transition: border-color 0.2s, transform 0.1s;
            color: #e6e8f2;
            margin-bottom: 8px;
        }

        .share-doc-item:hover {
            border-color: #5c7cff;
            transform: translateY(-1px);
        }

        .share-doc-item input[type="checkbox"] {
            width: 18px;
            height: 18px;
            margin-top: 3px;
            cursor: pointer;
        }

        .share-doc-title {
            font-weight: 700;
            font-size: 14px;
        }

        .share-doc-meta {
            color: #8d97bd;
            font-size: 12px;
            margin-top: 2px;
        }

        /* 标签选择样式 */
        .tag-checkbox-item {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 8px 0;
            border-bottom: 1px solid #1f2a44;
            color: #e6e8f2;
            cursor: pointer;
        }

        .tag-checkbox-item:last-child {
            border-bottom: none;
        }

        .tag-checkbox-item input[type="checkbox"] {
            width: 18px;
            height: 18px;
            cursor: pointer;
        }

        #tag-select-btn {
            background: #1f2a44;
            color: #8d97bd;
            border: 1px solid #27334d;
            width: 40px;
            height: 40px;
            border-radius: 12px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
        }

        #tag-select-btn:hover {
            border-color: #5c7cff;
            color: #7ee0ff;
        }

        #tag-select-btn.active {
            background: rgba(92, 124, 255, 0.2);
            border-color: #5c7cff;
            color: #7ee0ff;
        }
    </style>
</head>

<body>
    <div class="layout">
        <!-- 侧边栏 -->
        <div class="sidebar">
            <div class="sidebar-header">StudyAgent</div>

            <!-- 上传区 -->
            <div class="sidebar-section">
                <div class="section-title"><span>📁</span> 上传资料</div>
                <div style="display: flex; gap: 8px;">
                    <button id="upload-trigger-btn" style="flex: 1;">上传资料</button>
                    <button id="share-trigger-btn" style="flex: 1;">共享资料</button>
                </div>
            </div>

            <!-- 今日学习任务（日常任务） -->
            <div class="review-container">
                <div class="section-title"><span>📅</span> 今日学习任务</div>
                <div id="daily-task-list">
                    <div class="review-empty">正在拉取今日学习任务...</div>
                </div>
            </div>

            <!-- 复习推送区 -->
            <div class="review-container">
                <div class="section-title"><span>🔔</span> 每日复习提醒</div>
                <div id="review-list">
                    <!-- 动态加载 -->
                    <div class="review-empty">正在拉取今日复习任务...</div>
                </div>
            </div>

            <!-- 薄弱点清单 -->
            <div class="review-container">
                <div class="section-title"><span>📉</span> 知识薄弱点</div>
                <div id="weak-point-list">
                    <div class="review-empty">正在拉取薄弱点...</div>
                </div>
            </div>
        </div>

        <!-- 主对话区 -->
        <div class="main">
            <div class="chat-header">
                <h2>智能对话</h2>
                <div style="display: flex; align-items: center; gap: 16px;">
                    <button id="new-chat-btn" title="开启新对话"
                        style="background: linear-gradient(135deg, #5c7cff, #7ee0ff); border:none; color:#0a0e27; padding:8px 16px; border-radius:8px; cursor:pointer; font-weight:600; font-size:13px; transition:opacity 0.2s;">
                        ✨ 新对话
                    </button>
                    <button id="copy-btn" title="复制对话记录"
                        style="background:transparent; border:none; color:#1f2a44; cursor:pointer; padding:4px; display:flex; align-items:center; transition:color 0.2s;">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                            stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <rect x="9" y="9" width="13" height="13" rx="2" ry="2"></rect>
                            <path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path>
                        </svg>
                    </button>
                    <div style="font-size: 12px; color: #565f89;">基于知识库 RAG</div>
                </div>
            </div>
            <div id="chat-box">
                <div class="msg ai">
                    <div class="msg-content">你好！我是你的 StudyAgent。你可以上传资料建立知识库，我会为你规划学习、生成测验并提醒复习。今天想学点什么？</div>
                </div>
            </div>

            <div class="input-container">
                <div class="input-wrapper">
                    <button id="tag-select-btn" title="按标签过滤检索"
                        style="background: transparent; border: none; color: #8d97bd; cursor: pointer; display: flex; align-items: center; padding: 0 4px; transition: color 0.2s;">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                            stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M20.59 13.41l-7.17 7.17a2 2 0 0 1-2.83 0L2 12V2h10l8.59 8.59a2 2 0 0 1 0 2.82z">
                            </path>
                            <line x1="7" y1="7" x2="7.01" y2="7"></line>
                        </svg>
                    </button>
                    <textarea id="chat-input" placeholder="输入问题..." rows="1"></textarea>
                    <button id="chat-btn">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                            stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                            <line x1="22" y1="2" x2="11" y2="13"></line>
                            <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
                        </svg>
                    </button>
                </div>
            </div>
        </div>

        <!-- 右侧侧边栏：数据统计面板 -->
        <div class="right-sidebar">
            <div class="sidebar-header" style="border-bottom: 1px solid #1f2a44; text-align: center;">学习数据看板</div>

            <div class="sidebar-section">
                <!-- 顶部核心大指标: 仪表盘 -->
                <div id="echarts-mastery" style="width: 100%; height: 180px;"></div>

                <!-- 副指标并排 -->
                <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-top: -10px;">
                    <div
                        style="background: #11172b; padding: 12px; border-radius: 8px; text-align: center; border: 1px solid #1f2a44;">
                        <div style="font-size: 12px; color: #8d97bd;">学习时长 (分钟)</div>
                        <div style="font-size: 20px; font-weight: bold; color: #7ee0ff; margin-top: 4px;"
                            id="stat-minutes">--</div>
                    </div>
                    <div
                        style="background: #11172b; padding: 12px; border-radius: 8px; text-align: center; border: 1px solid #1f2a44;">
                        <div style="font-size: 12px; color: #8d97bd;">打卡天数 (天)</div>
                        <div style="font-size: 20px; font-weight: bold; color: #ffa07a; margin-top: 4px;"
                            id="stat-days">--</div>
                    </div>
                </div>
            </div>

            <div class="sidebar-section">
                <div class="section-title"><span>📈</span> 近7天学习图谱</div>
                <!-- 柱状/折线趋势图 -->
                <div id="echarts-trend" style="width: 100%; height: 160px; margin-top: 10px;"></div>
            </div>

            <div class="sidebar-section">
                <div class="section-title"><span>�</span> 攻克重心分布</div>
                <!-- 薄弱点分布饼图 -->
                <div id="echarts-weak-points" style="width: 100%; height: 180px; margin-top: 5px;"></div>
            </div>

            <div class="review-container">
                <div class="section-title"><span>⚠️</span> 重点攻克清单</div>
                <div id="dashboard-weak-points">
                    <div class="review-empty">正在拉取薄弱点...</div>
                </div>
            </div>
        </div>

        <!-- 标签选择对话框 -->
        <div id="tag-modal" class="modal">
            <div class="modal-content">
                <div class="modal-header">
                    <h3>选择检索标签</h3>
                    <button id="tag-modal-close">&times;</button>
                </div>
                <div id="tag-modal-body" class="modal-body">
                    <div class="review-empty">正在拉取现有标签...</div>
                </div>
                <div
                    style="padding: 16px 20px; border-top: 1px solid #1f2a44; display: flex; justify-content: flex-end; gap: 12px;">
                    <button id="tag-clear-btn"
                        style="background: transparent; border: 1px solid #1f2a44; color: #8d97bd; padding: 8px 16px; border-radius: 8px; cursor: pointer;">清空</button>
                    <button id="tag-confirm-btn"
                        style="background: linear-gradient(135deg, #5c7cff, #7ee0ff); border: none; color: #0a0e27; padding: 8px 16px; border-radius: 8px; cursor: pointer; font-weight: 600;">确认</button>
                </div>
            </div>
        </div>

        <!-- 上传对话框 -->
        <div id="upload-modal" class="modal">
            <div class="modal-content">
                <div class="modal-header">
                    <h3>上传资料</h3>
                    <button id="modal-close">&times;</button>
                </div>
                <div class="modal-body">
                    <div id="upload-form">
                        <input id="file" type="file" />
                        <textarea id="url" placeholder="粘贴 URL 或 文本..." rows="2"></textarea>
                        <input id="title" type="text" placeholder="标题 (可选)" />
                        <button id="upload-btn">开始解析</button>
                        <div id="upload-status" class="result"></div>
                    </div>
                </div>
            </div>
        </div>

        <!-- 共享资料对话框 -->
        <div id="share-modal" class="modal">
            <div class="modal-content">
                <div class="modal-header">
                    <h3>共享资料</h3>
                    <button id="share-modal-close">&times;</button>
                </div>
                <div class="modal-body" style="display: flex; flex-direction: column; gap: 12px;">
                    <div>
                        <div style="color:#8d97bd; font-size:13px; margin-bottom:6px;">选择要共享的文档：</div>
                        <div id="share-doc-list" class="share-doc-list">
                            <div class="review-empty">正在加载文档列表...</div>
                        </div>
                    </div>
                    <div style="display:flex; gap:8px; align-items:center;">
                        <span style="color:#8d97bd; font-size:13px;">目标 userId：</span>
                        <input id="share-target-user" type="number" placeholder="例如 2" style="flex:1;" />
                    </div>
                    <button id="share-submit-btn"
                        style="padding:12px; border:none; border-radius:8px; background:linear-gradient(135deg, #5c7cff, #7ee0ff); color:#0a0e27; font-weight:700; cursor:pointer;">确定共享</button>
                    <div id="share-status" class="result" style="display:none;"></div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const qs = (id) => document.getElementById(id);
        const chatBox = qs('chat-box');
        const chatInput = qs('chat-input');
        const chatBtn = qs('chat-btn');
        const uploadBtn = qs('upload-btn');
        const reviewList = qs('review-list');

        // 模态对话框相关
        const uploadTriggerBtn = qs('upload-trigger-btn');
        const uploadModal = qs('upload-modal');
        const modalClose = qs('modal-close');

        // 共享对话框相关
        const shareTriggerBtn = qs('share-trigger-btn');
        const shareModal = qs('share-modal');
        const shareModalClose = qs('share-modal-close');
        const shareDocList = qs('share-doc-list');
        const shareTargetUser = qs('share-target-user');
        const shareSubmitBtn = qs('share-submit-btn');
        const shareStatus = qs('share-status');

        // 标签对话框相关
        const tagSelectBtn = qs('tag-select-btn');
        const tagModal = qs('tag-modal');
        const tagModalClose = qs('tag-modal-close');
        const tagModalBody = qs('tag-modal-body');
        const tagConfirmBtn = qs('tag-confirm-btn');
        const tagClearBtn = qs('tag-clear-btn');
        let selectedTags = [];

        // 显示上传模态
        uploadTriggerBtn.addEventListener('click', () => {
            uploadModal.style.display = 'block';
        });

        // 关闭上传模态
        modalClose.addEventListener('click', () => {
            uploadModal.style.display = 'none';
        });

        // 共享模态
        shareTriggerBtn.addEventListener('click', async () => {
            shareModal.style.display = 'block';
            shareStatus.style.display = 'none';
            shareTargetUser.value = '';
            shareDocList.innerHTML = '<div class="review-empty">正在加载文档列表...</div>';
            try {
                const res = await fetch('/api/documents');
                const data = await res.json();
                const items = data.items || [];
                if (!items.length) {
                    shareDocList.innerHTML = '<div class="review-empty">暂无可共享的文档</div>';
                    return;
                }
                shareDocList.innerHTML = items.map(d => `
                    <label class="share-doc-item">
                        <input type="checkbox" value="${d.doc_id}" />
                        <div>
                            <div class="share-doc-title">${d.title}</div>
                            <div class="share-doc-meta">ID: ${d.doc_id} • ${d.source_type || 'file'} • 状态: ${d.status || '-'}
                            </div>
                        </div>
                    </label>
                `).join('');
            } catch (e) {
                shareDocList.innerHTML = '<div class="review-empty">加载失败</div>';
            }
        });

        shareModalClose.addEventListener('click', () => {
            shareModal.style.display = 'none';
        });

        shareSubmitBtn.addEventListener('click', async () => {
            const target = parseInt(shareTargetUser.value, 10);
            const selected = Array.from(shareDocList.querySelectorAll('input:checked')).map(cb => parseInt(cb.value, 10));
            if (!target) {
                shareStatus.style.display = 'block';
                shareStatus.style.color = '#ffa07a';
                shareStatus.textContent = '请填写目标 userId';
                return;
            }
            if (!selected.length) {
                shareStatus.style.display = 'block';
                shareStatus.style.color = '#ffa07a';
                shareStatus.textContent = '请至少选择一份文档';
                return;
            }
            shareStatus.style.display = 'block';
            shareStatus.style.color = '#7ee0ff';
            shareStatus.textContent = '正在共享...';
            try {
                const res = await fetch('/api/documents/share', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ target_user_id: target, doc_ids: selected })
                });
                const data = await res.json();
                if (res.ok) {
                    const shared = data.shared || [];
                    const failed = data.failed || [];
                    shareStatus.style.color = '#7ee0ff';
                    shareStatus.textContent = `共享成功 ${shared.length} 条${failed ? `，失败 ${failed.length} 条` : ''}`;
                } else {
                    shareStatus.style.color = '#ffa07a';
                    shareStatus.textContent = data.error || '共享失败';
                }
            } catch (e) {
                shareStatus.style.color = '#ffa07a';
                shareStatus.textContent = '共享失败';
            }
        });

        // 标签对话框逻辑
        tagSelectBtn.addEventListener('click', async () => {
            tagModal.style.display = 'block';
            tagModalBody.innerHTML = '<div class="review-empty">正在加载标签列表...</div>';
            try {
                const res = await fetch('/api/tags');
                const data = await res.json();
                const tags = data.tags || [];
                if (tags.length === 0) {
                    tagModalBody.innerHTML = '<div class="review-empty">暂无可用标签。请先上传资料。</div>';
                    return;
                }
                tagModalBody.innerHTML = tags.map(tag => `
                    <label class="tag-checkbox-item">
                        <input type="checkbox" value="${tag}" ${selectedTags.includes(tag) ? 'checked' : ''} />
                        <span>${tag}</span>
                    </label>
                `).join('');
            } catch (e) {
                tagModalBody.innerHTML = '<div class="review-empty">加载标签失败</div>';
            }
        });

        tagModalClose.addEventListener('click', () => {
            tagModal.style.display = 'none';
        });

        tagClearBtn.addEventListener('click', () => {
            tagModalBody.querySelectorAll('input:checked').forEach(cb => cb.checked = false);
            selectedTags = [];
            tagSelectBtn.style.color = '#8d97bd';
        });

        tagConfirmBtn.addEventListener('click', () => {
            const checked = Array.from(tagModalBody.querySelectorAll('input:checked')).map(cb => cb.value);
            selectedTags = checked;
            tagSelectBtn.style.color = selectedTags.length > 0 ? '#7ee0ff' : '#8d97bd';
            tagModal.style.display = 'none';
        });

        // 点击背景关闭
        window.addEventListener('click', (e) => {
            if (e.target === uploadModal) uploadModal.style.display = 'none';
            if (e.target === tagModal) tagModal.style.display = 'none';
            if (e.target === shareModal) shareModal.style.display = 'none';
        });

        // 自动高度文本域
        chatInput.addEventListener('input', function () {
            this.style.height = 'auto';
            this.style.height = (this.scrollHeight) + 'px';
        });

        // 1. 自动拉取复习任务
        async function loadTodayReviews() {
            try {
                const res = await fetch('/api/reviews/today');
                const data = await res.json();
                if (!data.items || data.items.length === 0) {
                    reviewList.innerHTML = '<div class="review-empty">☕ 今日无待复习内容，去学点新的吧！</div>';
                    return;
                }
                reviewList.innerHTML = data.items.map(item => {
                    const typeLabel = item.target_type === 'daily_task' ? '任务复习' : '错题巩固';
                    const stageLabel = item.stage ? `复习阶段 ${item.stage}` : '';

                    let title = '复习任务';
                    let detailHtml = '';

                    if (item.target_type === 'daily_task' && item.target) {
                        title = item.target.title || '今日学习计划';
                        if (item.target.outline) {
                            const outline = Array.isArray(item.target.outline) ? item.target.outline : [];
                            detailHtml = outline.map(p => `<div style="margin-top:2px;">• ${p}</div>`).join('');
                        }
                    } else if (item.target_type === 'weak_point' && item.target) {
                        title = '薄弱点加固';
                        detailHtml = `<div style="color:#ff9e64;">${item.target.description || '知识点遗漏'}</div>`;
                        if (item.target.level) {
                            detailHtml += `<div style="font-size:10px; opacity:0.7;">掌握程度: ${item.target.level}</div>`;
                        }
                    }

                    return `
            <div class="review-item">
              <div class="review-header">
                <span class="review-tag">${typeLabel}</span>
                <span class="review-meta">${stageLabel}</span>
              </div>
              <div class="review-text">${title}</div>
              <div class="review-detail">${detailHtml || '基于遗忘曲线的例行复习'}</div>
            </div>
          `;
                }).join('');
            } catch (e) {
                reviewList.innerHTML = '<div class="review-empty">加载失败，请检查网络</div>';
            }
        }

        // 2. 上传逻辑
        async function uploadDocument() {
            const file = qs('file').files[0];
            const url = qs('url').value;
            const title = qs('title').value;

            if (!file && !url) return alert('请提供文件或文本/URL');

            uploadBtn.disabled = true;
            uploadBtn.textContent = '解析中...';
            const status = qs('upload-status');
            status.style.display = 'block';
            status.textContent = '⏱ 正在处理文档分块并建立索引...';

            const formData = new FormData();
            if (file) formData.append('file', file);
            if (url) formData.append('url', url);
            if (title) formData.append('title', title);

            try {
                const res = await fetch('/api/documents/upload', { method: 'POST', body: formData });
                const data = await res.json();
                if (res.ok) {
                    status.textContent = '✅ 解析完成，知识库已更新';
                    qs('file').value = '';
                    qs('url').value = '';
                    setTimeout(() => { status.style.display = 'none'; }, 3000);
                } else {
                    throw new Error(data.error);
                }
            } catch (e) {
                status.textContent = '❌ 错误: ' + e.message;
            } finally {
                uploadBtn.disabled = false;
                uploadBtn.textContent = '开始解析';
            }
        }

        // 3. 对话渲染
        function appendMsg(role, text) {
            const div = document.createElement('div');
            div.className = `msg ${role === 'user' ? 'user' : 'ai'}`;
            const content = document.createElement('div');
            content.className = 'msg-content';

            if (role === 'ai') {
                const html = marked.parse(text);
                content.innerHTML = DOMPurify.sanitize(html);
            } else {
                content.textContent = text;
            }

            div.appendChild(content);
            chatBox.appendChild(div);
            chatBox.scrollTop = chatBox.scrollHeight;
        }

        async function handleSend() {
            const text = chatInput.value.trim();
            if (!text) return;

            appendMsg('user', text);
            chatInput.value = '';
            chatInput.style.height = 'auto';

            try {
                const res = await fetch('/api/chat', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        query: text,
                        tags: selectedTags.length > 0 ? selectedTags : null
                    })
                });
                const data = await res.json();
                appendMsg('ai', data.reply || '抱歉，我没有理解你的意思。');
            } catch (e) {
                appendMsg('ai', '❌ 服务器连接失败: ' + e.message);
            }
        }

        uploadBtn.addEventListener('click', uploadDocument);
        chatBtn.addEventListener('click', handleSend);

        // 4. 复制功能
        qs('copy-btn').addEventListener('click', async () => {
            const messages = Array.from(chatBox.querySelectorAll('.msg')).map(msg => {
                const isUser = msg.classList.contains('user');
                const role = isUser ? '[user]' : '[assistant]';
                let content = msg.querySelector('.msg-content').innerText.replace(/\n/g, ' ').trim();
                return `${role}: ${content}`;
            }).join('\n');

            try {
                await navigator.clipboard.writeText(messages);
                const btn = qs('copy-btn');
                const originalColor = btn.style.color;
                btn.style.color = '#7ee0ff'; // 亮色提示成功
                setTimeout(() => btn.style.color = originalColor, 1000);
            } catch (err) {
                alert('复制失败: ' + err);
            }
        });

        chatInput.addEventListener('keydown', (e) => {
            if (e.key === 'Enter' && e.ctrlKey) {
                e.preventDefault();
                handleSend();
            }
        });

        // 5. 新对话按钮
        qs('new-chat-btn').addEventListener('click', () => {
            chatBox.innerHTML = '';
            chatInput.value = '';
            chatInput.style.height = 'auto';
            appendMsg('ai', '你好！我是你的 StudyAgent。你可以上传资料建立知识库，我会为你规划学习、生成测验并提醒复习。今天想学点什么？');
        });

        // 页面启动拉取
        window.addEventListener('load', loadTodayReviews);
    </script>
</body>

</html>

<script>
    // === 工具函数 ===
    function formatDate(dateStr) {
        if (!dateStr) return "";
        try {
            const d = new Date(dateStr);
            return d.toISOString().slice(0, 10);
        } catch {
            return dateStr;
        }
    }

    async function apiGet(url) {
        const resp = await fetch(url);
        if (!resp.ok) {
            throw new Error(`GET ${url} failed: ${resp.status}`);
        }
        return resp.json();
    }

    async function apiPost(url, body) {
        const resp = await fetch(url, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: body ? JSON.stringify(body) : null,
        });
        if (!resp.ok) {
            const msg = await resp.text();
            throw new Error(`POST ${url} failed: ${resp.status} ${msg}`);
        }
        return resp.json().catch(() => ({}));
    }

    // === 日常任务相关 ===
    async function loadTodayDailyTasks() {
        const container = document.getElementById("daily-task-list");
        container.innerHTML = '<div class="review-empty">正在拉取今日学习任务...</div>';
        try {
            const data = await apiGet("/api/daily-tasks/today");
            const tasks = data.tasks || [];
            if (!tasks.length) {
                container.innerHTML = '<div class="review-empty">今日暂无学习任务</div>';
                return;
            }
            container.innerHTML = "";
            for (const t of tasks) {
                const div = document.createElement("div");
                div.className = "review-item";
                const statusLabel = t.status || "pending";
                div.innerHTML = `
                    <div class="review-header">
                        <div>
                            <div class="review-tag">日常任务</div>
                            <div class="review-text" style="margin-top:2px;">${t.title}</div>
                        </div>
                        <div class="review-meta">
                            <div>日期：${formatDate(t.date)}</div>
                            <div>状态：${statusLabel}</div>
                        </div>
                    </div>
                    <div class="review-detail">
                        ${t.outline && t.outline.length ? t.outline.map(p => `• ${p}`).join('<br/>') : "基于学习计划生成的日常任务"}
                    </div>
                    <div style="margin-top:4px; display:flex; gap:4px; justify-content:flex-end;">
                        <button class="mini-btn" data-action="complete">完成任务</button>
                        <button class="mini-btn" data-action="skip">跳过任务</button>
                    </div>
                `;

                const completeBtn = div.querySelector('button[data-action="complete"]');
                const skipBtn = div.querySelector('button[data-action="skip"]');
                completeBtn.onclick = () => completeDailyTask(t.id, "completed");
                skipBtn.onclick = () => completeDailyTask(t.id, "skipped");

                container.appendChild(div);
            }
        } catch (e) {
            console.error(e);
            container.innerHTML = '<div class="review-empty">获取今日学习任务失败</div>';
        }
    }

    async function completeDailyTask(taskId, status) {
        try {
            await apiPost(`/api/daily-tasks/${taskId}/status`, { status });
            await loadTodayDailyTasks();
            await loadTodayReviews();
            await loadDashboardStats();
        } catch (e) {
            console.error(e);
            alert("更新日常任务状态失败: " + e.message);
        }
    }

    // === 复习任务相关 ===
    async function loadTodayReviews() {
        const container = document.getElementById("review-list");
        container.innerHTML = '<div class="review-empty">正在拉取今日复习任务...</div>';
        try {
            const data = await apiGet("/api/reviews/today");
            const items = data.items || [];
            if (!items.length) {
                container.innerHTML = '<div class="review-empty">今日暂无需要复习的任务</div>';
                return;
            }
            container.innerHTML = "";
            for (const item of items) {
                const div = document.createElement("div");
                div.className = "review-item";

                const target = item.target || {};
                const isDaily = item.target_type === "daily_task";
                const isWeak = item.target_type === "weak_point";

                const title = isDaily
                    ? (target.title || "日常任务")
                    : (target.description || "薄弱点复习");

                div.innerHTML = `
                    <div class="review-header">
                        <div>
                            <div class="review-tag">${isDaily ? "日常任务复习" : "薄弱点复习"} · 第${item.stage}轮</div>
                            <div class="review-text" style="margin-top:4px;">${title}</div>
                        </div>
                        <div class="review-meta">
                            <div>计划日期：${formatDate(item.scheduled_date)}</div>
                            <div>状态：${item.status}</div>
                        </div>
                    </div>
                    <div class="review-detail">
                        ${isDaily ? `学习日期：${formatDate(target.date)}` : ""}
                    </div>
                    <div style="margin-top:4px; display:flex; gap:4px; justify-content:flex-end;">
                        <button class="mini-btn" data-action="complete">完成复习</button>
                        <button class="mini-btn" data-action="skip">跳过本次</button>
                    </div>
                `;

                const completeBtn = div.querySelector('button[data-action="complete"]');
                const skipBtn = div.querySelector('button[data-action="skip"]');
                completeBtn.onclick = () => completeReview(item.review_id, "completed");
                skipBtn.onclick = () => completeReview(item.review_id, "skipped");

                container.appendChild(div);
            }
        } catch (e) {
            console.error(e);
            container.innerHTML = '<div class="review-empty">获取复习任务失败</div>';
        }
    }

    async function completeReview(reviewId, status) {
        try {
            await apiPost(`/api/reviews/${reviewId}/complete`, { status });
            await loadTodayReviews();
            await loadDashboardStats();
        } catch (e) {
            console.error(e);
            alert("更新复习任务状态失败: " + e.message);
        }
    }

    // === 薄弱点相关 ===
    async function loadWeakPoints() {
        const container = document.getElementById("weak-point-list");
        container.innerHTML = '<div class="review-empty">正在拉取薄弱点...</div>';
        try {
            const data = await apiGet("/api/weak-points?status=pending");
            const items = data.items || [];
            if (!items.length) {
                container.innerHTML = '<div class="review-empty">暂无待解决的薄弱点</div>';
                return;
            }
            container.innerHTML = "";
            for (const wp of items) {
                const div = document.createElement("div");
                div.className = "review-item";
                div.innerHTML = `
                    <div class="review-header">
                        <div>
                            <div class="review-tag">薄弱点 · ${wp.level || "medium"}</div>
                            <div class="review-text" style="margin-top:4px;">${wp.description}</div>
                        </div>
                        <div class="review-meta">
                            <div>状态：${wp.status}</div>
                            <div>创建：${formatDate(wp.created_at)}</div>
                        </div>
                    </div>
                    <div class="review-detail">
                        状态：${wp.status} · 创建：${formatDate(wp.created_at)}
                    </div>
                    <div style="margin-top:4px; display:flex; gap:4px; justify-content:flex-end;">
                        <button class="mini-btn" data-action="resolved">标记已解决</button>
                        <button class="mini-btn" data-action="ignored">忽略</button>
                    </div>
                `;

                const resolvedBtn = div.querySelector('button[data-action="resolved"]');
                const ignoredBtn = div.querySelector('button[data-action="ignored"]');
                resolvedBtn.onclick = () => updateWeakPointStatus(wp.id, "resolved");
                ignoredBtn.onclick = () => updateWeakPointStatus(wp.id, "ignored");

                container.appendChild(div);
            }
        } catch (e) {
            console.error(e);
            container.innerHTML = '<div class="review-empty">获取薄弱点失败</div>';
        }
    }

    async function updateWeakPointStatus(id, status) {
        try {
            await apiPost(`/api/weak-points/${id}/status`, { status });
            await loadWeakPoints();
            await loadDashboardStats();
        } catch (e) {
            console.error(e);
            alert("更新薄弱点状态失败: " + e.message);
        }
    }

    let chartMastery = null;
    let chartTrend = null;
    let chartWeakPoints = null;

    // === Dashboard 数据面板相关 ===
    async function loadDashboardStats() {
        try {
            const data = await apiGet('/api/stats/dashboard');

            // 更新简单文本指标
            document.getElementById('stat-minutes').innerText = data.total_learning_minutes || 0;
            document.getElementById('stat-days').innerText = data.completed_task_days || 0;

            // 1. ECharts 掌握度(仪表盘)
            if (!chartMastery) {
                chartMastery = echarts.init(document.getElementById('echarts-mastery'));
                window.addEventListener('resize', () => chartMastery.resize());
            }
            const masteryScore = data.average_mastery_score || 0;
            chartMastery.setOption({
                series: [
                    {
                        type: 'gauge',
                        startAngle: 180,
                        endAngle: 0,
                        min: 0,
                        max: 100,
                        splitNumber: 5,
                        axisLine: {
                            lineStyle: {
                                width: 12,
                                color: [
                                    [0.3, '#ff6b6b'],
                                    [0.7, '#ffa07a'],
                                    [1, '#75fb9c']
                                ]
                            }
                        },
                        pointer: {
                            length: '60%',
                            width: 4,
                            itemStyle: { color: 'auto' }
                        },
                        axisTick: { show: false },
                        splitLine: { show: false },
                        axisLabel: { show: false },
                        title: {
                            offsetCenter: [0, '80%'],
                            fontSize: 12,
                            color: '#8d97bd'
                        },
                        detail: {
                            fontSize: 24,
                            offsetCenter: [0, '50%'],
                            valueAnimation: true,
                            formatter: function (value) {
                                return Math.round(value) + '分';
                            },
                            color: '#e6e8f2'
                        },
                        data: [{ value: masteryScore, name: '知识掌握度' }]
                    }
                ]
            });

            // 2. ECharts 趋势(柱状图)
            if (!chartTrend) {
                chartTrend = echarts.init(document.getElementById('echarts-trend'));
                window.addEventListener('resize', () => chartTrend.resize());
            }
            const trend = data.last_7_days_trend || [];
            const xAxisData = trend.map(t => t.date.slice(5)); // MM-DD
            const seriesData = trend.map(t => {
                let color = '#1f2a44';
                if (t.status === 'completed') color = '#7ee0ff';
                else if (t.status === 'pending' || t.status === 'skipped') color = '#565f89';
                return {
                    value: t.minutes,
                    itemStyle: { color: color }
                };
            });
            chartTrend.setOption({
                tooltip: { trigger: 'axis', axisPointer: { type: 'shadow' } },
                grid: { left: '2%', right: '4%', bottom: '0%', top: '10%', containLabel: true },
                xAxis: {
                    type: 'category',
                    data: xAxisData,
                    axisLabel: { color: '#8d97bd', fontSize: 10 },
                    axisLine: { lineStyle: { color: '#1f2a44' } },
                    axisTick: { show: false }
                },
                yAxis: {
                    type: 'value',
                    splitLine: { lineStyle: { color: '#1f2a44', type: 'dashed' } },
                    axisLabel: { color: '#8d97bd', fontSize: 10 }
                },
                series: [{
                    name: '学习时长(分钟)',
                    type: 'bar',
                    barWidth: '50%',
                    itemStyle: { borderRadius: [4, 4, 0, 0] },
                    data: seriesData
                }]
            });

            // 3. ECharts 薄弱点分布(环形饼图)
            if (!chartWeakPoints) {
                chartWeakPoints = echarts.init(document.getElementById('echarts-weak-points'));
                window.addEventListener('resize', () => chartWeakPoints.resize());
            }
            const awp = data.active_weak_points || { high: 0, medium: 0 };
            const wData = [
                { name: '严重', value: awp.high || 0, itemStyle: { color: '#ff6b6b' } },
                { name: '中等', value: awp.medium || 0, itemStyle: { color: '#ffa07a' } },
            ];
            if (wData[0].value === 0 && wData[1].value === 0) {
                wData.push({ name: '良好', value: 1, itemStyle: { color: '#75fb9c' } });
            }
            chartWeakPoints.setOption({
                tooltip: { trigger: 'item' },
                legend: { bottom: '0%', left: 'center', textStyle: { color: '#8d97bd', fontSize: 10 }, icon: 'circle' },
                series: [
                    {
                        name: '薄弱点数量',
                        type: 'pie',
                        radius: ['50%', '75%'],
                        center: ['50%', '42%'],
                        avoidLabelOverlap: false,
                        label: { show: false, position: 'center' },
                        emphasis: {
                            label: {
                                show: true,
                                fontSize: 12,
                                fontWeight: 'bold',
                                color: '#e6e8f2'
                            }
                        },
                        labelLine: { show: false },
                        data: wData
                    }
                ]
            });

            // Top 10 薄弱点 (保持文字清单方便直接看提示)
            const wpsContainer = document.getElementById('dashboard-weak-points');
            const recentWps = data.recent_weak_points || [];
            if (!recentWps.length) {
                wpsContainer.innerHTML = '<div class="review-empty">太棒了！暂无重要薄弱点。</div>';
            } else {
                wpsContainer.innerHTML = '';
                recentWps.forEach(wp => {
                    const color = wp.level === 'high' ? '#ff6b6b' : '#ffa07a';
                    const div = document.createElement('div');
                    div.style = 'background: #11172b; padding: 10px; margin-bottom: 8px; border-radius: 8px; border: 1px solid #1f2a44;';
                    div.innerHTML = `
                        <div style="display:flex; justify-content:space-between; align-items:baseline;">
                            <div style="font-size:12px; font-weight:bold; color:#e6e8f2; overflow:hidden; text-overflow:ellipsis; white-space:nowrap;" title="${wp.description}">${wp.description}</div>
                            <div style="font-size:10px; background:${color}33; color:${color}; padding:2px 6px; border-radius:4px; flex-shrink:0; margin-left:8px;">${wp.level}</div>
                        </div>
                        <div style="font-size:10px; color:#565f89; margin-top:4px;">发现于: ${wp.created_at.slice(0, 10)}</div>
                    `;
                    wpsContainer.appendChild(div);
                });
            }

        } catch (e) {
            console.error('获取统计数据失败', e);
        }
    }

    // 简单按钮样式，复用现有色系
    const style = document.createElement("style");
    style.textContent = `
        .mini-btn {
            padding: 4px 8px;
            border-radius: 4px;
            border: none;
            font-size: 11px;
            cursor: pointer;
            background: #1f2a44;
            color: #e6e8f2;
            transition: background 0.2s, transform 0.1s;
        }
        .mini-btn:hover {
            background: #5c7cff;
            transform: translateY(-1px);
        }
    `;
    document.head.appendChild(style);

    // 初始化加载
    window.addEventListener("load", () => {
        loadTodayDailyTasks();
        loadTodayReviews();
        loadWeakPoints();
        loadDashboardStats();
    });
</script>
